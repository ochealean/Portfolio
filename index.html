<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wave Canvas</title>

  <link href="animations.css" type="text/css" rel="stylesheet">
  <link href="content.css" type="text/css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/deepar/js/deepar.js"></script>
</head>
<body>
  <!-- Your background / wave canvases -->
  <canvas class="waveCanvas1" id="waveCanvas1"></canvas>
  <canvas class="waveCanvas2" id="waveCanvas2"></canvas>
  <canvas class="waveCanvas3" id="waveCanvas3"></canvas>

  <!-- Intro section -->
  <div class="introductionSection">
    <div class="name_and_introContainer">
      <div class="nameContainer">
        <h1 class="name">Hi, I'm Leander P. Ochea</h1>
      </div>
      <div class="introContainer">
        <p class="introduction">Your journey starts here 🐟💩</p>
      </div>
    </div>
    <button class="cta-button">Get Started</button>
  </div>

  <!-- DeepAR canvas -->
  <div class="content">
    <canvas id="deepar-canvas" width="640" height="480"></canvas>
  </div>

  <!-- DeepAR init script -->
  <script>
    (async function () {
      const deepAR = await deepar.initialize({
        licenseKey: '2a291134917d2f127714860686e482ea1f9ea02eccd675857d0c50a8459b4355ffb621d4cee7e603',
        canvas: document.getElementById('deepar-canvas'),
        effect: 'trypo.deeparproj',
        // 👆 needs to point directly to the .deeparproj file
        additionalOptions: {
          cameraConfig: {
            facingMode: 'environment'  // back camera
          }
        }
      });
    })().catch(err => {
      console.error("Error initializing DeepAR:", err);
    });
  </script>

  <script src="wave.js" type="module"></script>
</body>
</html>
